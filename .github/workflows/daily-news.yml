name: Daily AI News Update (Fixed)

on:
  schedule:
    # 每天UTC时间0:30运行（北京时间上午8:30）
    - cron: '30 0 * * *'
  workflow_dispatch:  # 允许手动触发

# 必要权限配置
permissions:
  contents: write  # 写入内容权限（用于推送到gh-pages分支）

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（使用默认的GITHUB_TOKEN，无需额外指定）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置Node.js环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 配置环境变量（如果有）
      - name: Setup environment variables
        run: |
          # 如果配置了API密钥，则创建.env文件
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "✅ 检测到ANTHROPIC_API_KEY，配置环境变量"
            if [ -f .env.example ]; then
              cp .env.example .env
              sed -i "s|your_api_key_here|${{ secrets.ANTHROPIC_API_KEY }}|g" .env
            else
              echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env
            fi
          else
            echo "⚠️  未检测到ANTHROPIC_API_KEY，跳过AI摘要功能"
            # 不创建.env文件，让cli.ts检测到空值
            if [ -f .env ]; then
              rm .env  # 删除可能存在的旧.env文件
            fi
          fi

      # 5. 通过 Orchestrator Agent 运行完整管线（fetch → summarize → render）
      - name: Run pipeline via Orchestrator Agent
        run: |
          echo "🗂️  Node.js version: $(node -v)"
          echo "🗂️  管线输出目录: ./output"
          npx tsx src/cli.ts agent orchestrator --force

      # 6. 准备部署文件
      - name: Prepare deployment files
        run: |
          # 创建dist目录（如果不存在）
          mkdir -p dist

          # 从orchestrator的输出目录复制最新的HTML文件为index.html
          latest_html=$(ls -t output/ai-news-*.html | head -1)
          if [ -f "$latest_html" ]; then
            cp "$latest_html" dist/index.html
            echo "✅ 已将 $latest_html 复制为 dist/index.html"
          else
            echo "⚠️  未找到HTML文件，检查 output/ 目录"
            ls -la output/ 2>/dev/null || echo "output/ 目录不存在"
          fi

          # 创建.nojekyll文件以禁用Jekyll处理
          touch dist/.nojekyll

          # 列出生成的文件
          ls -la dist/

      # 7. 部署到GitHub Pages (gh-pages分支)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: false
          commit_message: "🚀 部署AI新闻日报: $(date +'%Y-%m-%d %H:%M:%S')"

      # 8. 输出部署信息
      - name: Show deployment info
        run: |
          echo "✅ AI新闻日报已成功部署到GitHub Pages!"
          echo "🌐 访问地址: https://${{ github.repository_owner }}.github.io/$(echo ${{ github.repository }} | cut -d'/' -f2)/"
          echo "📱 公众号菜单可配置此链接"